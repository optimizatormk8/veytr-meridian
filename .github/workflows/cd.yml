name: CD

on:
  push:
    branches: [main]
    paths:
      - setup.sh

jobs:
  sync-setup-script:
    name: Sync setup.sh to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Copy setup.sh to docs/
        run: cp setup.sh docs/setup.sh

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet docs/setup.sh && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/setup.sh
          git commit -m "Sync setup.sh to GitHub Pages [skip ci]"
          git push
