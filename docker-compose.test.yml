# 3x-ui integration test — spins up panel for API round-trip validation.
# Usage: docker compose -f docker-compose.test.yml up -d
# Unlike production (network_mode: host), uses port mapping for CI compat.
services:
  3x-ui:
    image: ghcr.io/mhsanaei/3x-ui:2.8.11
    container_name: 3x-ui-test
    ports:
      - "2053:2053"
    volumes:
      - 3x-ui-test-db:/etc/x-ui/
    environment:
      XRAY_VMESS_AEAD_FORCED: "true"
    tty: true
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"

volumes:
  3x-ui-test-db:
